name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_menu_roulette
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_NAME: test_menu_roulette
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: python manage.py migrate

      - name: Run tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_NAME: test_menu_roulette
          DB_USER: postgres
          DB_PASSWORD: postgres
          GOOGLE_PLACES_API_KEY: test
          GEMINI_API_KEY: test
          AI_PROVIDER: gemini
        run: python manage.py test roulette -v 2

  frontend-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend

      - name: Build frontend image
        run: docker build ./frontend